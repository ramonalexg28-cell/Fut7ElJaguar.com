<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cobro de Árbitro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@700&display=swap');
        
        body {
            font-family: 'Comic Neue', cursive;
            background: linear-gradient(135deg, #8e44ad 0%, #3498db 100%);
            padding: 20px;
            position: relative;
            overflow-x: hidden;
            min-height: 100vh;
        }
        
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle, #fff 1px, transparent 1px),
                radial-gradient(circle, #fff 1px, transparent 1px);
            background-size: 50px 50px;
            background-position: 0 0, 25px 25px;
            opacity: 0.15;
            z-index: 0;
            pointer-events: none;
        }
        
        .card {
            max-width: 600px;
            margin: auto;
            background: #fff;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 
                8px 8px 0 rgba(0, 0, 0, 0.8),
                12px 12px 0 rgba(142, 68, 173, 0.5);
            border: 5px solid #000;
            position: relative;
            z-index: 1;
            transform: rotate(-0.5deg);
        }
        
        h2 {
            font-family: 'Bangers', cursive;
            text-align: center;
            background: linear-gradient(45deg, #8e44ad, #9b59b6);
            color: #fff;
            padding: 20px;
            border-radius: 15px;
            font-size: 32px;
            letter-spacing: 3px;
            text-shadow: 
                3px 3px 0 #000,
                -1px -1px 0 #000,
                1px -1px 0 #000,
                -1px 1px 0 #000;
            border: 4px solid #000;
            transform: rotate(0.5deg);
            box-shadow: 5px 5px 0 rgba(0, 0, 0, 0.3);
        }
        
        label {
            display: block;
            margin-top: 18px;
            font-weight: bold;
            font-size: 18px;
            color: #2d3436;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        input,
        select {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            border-radius: 10px;
            border: 4px solid #000;
            font-family: 'Comic Neue', cursive;
            font-size: 16px;
            font-weight: bold;
            background: #fff;
            box-shadow: 
                inset 2px 2px 0 rgba(0, 0, 0, 0.1),
                4px 4px 0 rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }
        
        input:focus,
        select:focus {
            outline: none;
            transform: translate(-2px, -2px);
            box-shadow: 
                inset 2px 2px 0 rgba(0, 0, 0, 0.1),
                6px 6px 0 rgba(142, 68, 173, 0.4);
        }
        
        button {
            margin-top: 25px;
            width: 100%;
            padding: 18px;
            font-size: 24px;
            font-family: 'Bangers', cursive;
            letter-spacing: 2px;
            background: linear-gradient(45deg, #8e44ad, #c471ed);
            color: white;
            border: 5px solid #000;
            border-radius: 15px;
            cursor: pointer;
            text-transform: uppercase;
            text-shadow: 2px 2px 0 rgba(0, 0, 0, 0.3);
            box-shadow: 
                5px 5px 0 rgba(0, 0, 0, 0.8),
                8px 8px 0 rgba(196, 113, 237, 0.3);
            transition: all 0.2s ease;
            position: relative;
        }
        
        button:hover {
            transform: translate(2px, 2px);
            box-shadow: 
                3px 3px 0 rgba(0, 0, 0, 0.8),
                5px 5px 0 rgba(196, 113, 237, 0.3);
        }
        
        button:active {
            transform: translate(5px, 5px);
            box-shadow: none;
        }
        
        .ok {
            margin-top: 20px;
            padding: 15px;
            background: linear-gradient(45deg, #c471ed, #a29bfe);
            border: 4px solid #000;
            border-radius: 12px;
            font-weight: bold;
            font-size: 18px;
            text-align: center;
            color: #fff;
            text-shadow: 2px 2px 0 rgba(0, 0, 0, 0.3);
            box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.4);
            animation: pop 0.5s ease;
        }
        
        @keyframes pop {
            0% {
                transform: scale(0.8);
                opacity: 0;
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
        
        /* Silbato animado */
        .whistle {
            position: absolute;
            width: 40px;
            height: 40px;
            background: #ffd700;
            border: 3px solid #000;
            border-radius: 50%;
            animation: swing 2s infinite ease-in-out;
        }
        
        .whistle::after {
            content: "🎵";
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 20px;
            animation: musicNote 2s infinite;
        }
        
        .whistle:nth-child(1) {
            top: 30px;
            right: 40px;
        }
        
        .whistle:nth-child(2) {
            bottom: 40px;
            left: 40px;
            animation-delay: 1s;
        }
        
        @keyframes swing {
            0%, 100% {
                transform: rotate(-15deg);
            }
            50% {
                transform: rotate(15deg);
            }
        }
        
        @keyframes musicNote {
            0%, 100% {
                opacity: 0;
                transform: translateX(-50%) translateY(0);
            }
            50% {
                opacity: 1;
                transform: translateX(-50%) translateY(-10px);
            }
        }
        
        /* Tarjetas decorativas */
        .card-decoration {
            position: absolute;
            width: 30px;
            height: 45px;
            border: 3px solid #000;
            border-radius: 4px;
            animation: float 3s infinite ease-in-out;
        }
        
        .red-card {
            background: #ff4757;
            top: 60px;
            left: 20px;
        }
        
        .yellow-card {
            background: #ffd700;
            bottom: 60px;
            right: 20px;
            animation-delay: 1.5s;
        }
        
        @keyframes float {
            0%, 100% {
                transform: translateY(0) rotate(5deg);
            }
            50% {
                transform: translateY(-15px) rotate(-5deg);
            }
        }
        
        /* Efecto de silbato en el título */
        h2::before {
            content: "🔴";
            position: absolute;
            left: -35px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 28px;
            animation: pulse 1.5s infinite;
        }
        
        h2::after {
            content: "🟡";
            position: absolute;
            right: -35px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 28px;
            animation: pulse 1.5s infinite 0.75s;
        }
        
        @keyframes pulse {
            0%, 100% {
                transform: translateY(-50%) scale(1);
                opacity: 1;
            }
            50% {
                transform: translateY(-50%) scale(1.3);
                opacity: 0.7;
            }
        }
    </style>
</head>
<body>
    <div class="whistle"></div>
    <div class="whistle"></div>
    <div class="card-decoration red-card"></div>
    <div class="card-decoration yellow-card"></div>
    <div class="card">
        <h2>⚽ Cobro de Árbitro 🥅</h2>
        <label>🆔 ID Cobro Árbitro</label>
        <input id="ca_id">
        <label>🏟️ ID Partido</label>
        <input id="ca_partido">
        <label>👨‍⚖️ ID Persona (Árbitro)</label>
        <input id="ca_persona">
        <label>💳 Tipo de Pago</label>
        <select id="ca_tipopago">
            <option>1 - Efectivo</option>
            <option>2 - Tarjeta</option>
            <option>3 - Transferencia</option>
        </select>
        <label>📅 Fecha</label>
        <input type="date" id="ca_fecha">
        <label>💰 Monto</label>
        <input type="number" id="ca_monto">
        <label>📄 Folio</label>
        <input id="ca_folio">
        <label>✅ Estado</label>
        <select id="ca_estado">
            <option>Pagado</option>
            <option>Pendiente</option>
        </select>
        <button onclick="save()">💾 ¡Guardar!</button>
        <div id="msg"></div>
    </div>
    <script>
        function save() { 
            const data = { 
                id: ca_id.value, 
                partido: ca_partido.value, 
                persona: ca_persona.value, 
                tipo: ca_tipopago.value, 
                fecha: ca_fecha.value, 
                monto: ca_monto.value, 
                folio: ca_folio.value, 
                estado: ca_estado.value 
            }; 
            
            const dataStr = JSON.stringify(data);
            const savedData = {};
            Object.keys(data).forEach(key => {
                savedData[key] = data[key];
            });
            
            msg.innerHTML = "<div class='ok'>⚽ ¡DATOS GUARDADOS CON ÉXITO! 🏆</div>"; 
        }
    </script>
</body>
</html>
